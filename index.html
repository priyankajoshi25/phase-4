<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Content Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  
  <div class="main-wrapper">
    <h1>✨ AI Content Generator</h1>
    <p class="subtitle">An AI-powered tool for questions, summaries, and ideas.</p>

    <div class="card">
      <label for="feature">Choose a Feature</label>
      <select id="feature">
        <option value="ask">Ask Me Anything</option>
        <option value="summarize">Quick Summarizer</option>
        <option value="idea">Idea Spark</option>
        <option value="define">Definition Finder</option>
      </select>

      <textarea id="input" placeholder="Type your input here..."></textarea>

      <button onclick="generate()">Generate</button>

      <div id="output" class="output-box">Your result will appear here...</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
